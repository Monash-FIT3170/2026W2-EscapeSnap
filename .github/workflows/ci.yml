name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: meteorengineer/setup-meteor@v3
        with:
          meteor-release: '3.4'

      - name: Install dependencies
        run: meteor npm ci

      - name: Lint
        run: meteor npm run lint

      # Uncomment when Playwright is configured under e2e/:
      # - name: Install Playwright browsers
      #   run: cd e2e && npx playwright install --with-deps chromium
      # - name: E2E tests
      #   run: meteor npm run test:e2e
